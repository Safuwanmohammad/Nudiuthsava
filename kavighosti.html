<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vidyarthi Kavighosti Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<section class="form-section">
<div class="form-box">

<a href="index.html" class="back-btn">← Back to Home</a>
<h1>VIDYARTHI KAVIGHOSTI</h1>

<form>
<div class="form-group">
<label>College Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Principal Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Principal Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Student Participant's Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Student's Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Course</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Semester</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Student Register Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Message (Optional)</label>
<textarea rows="4"></textarea>
</div>

<div class="form-buttons">
<button type="submit" class="submit-btn">Submit</button>
<button type="reset" class="reset-btn">Reset</button>
</div>

</form>
</div>
</section>
</body>
</html>
